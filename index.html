<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Leyenda de los Derrotados</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  
  <!-- PANTALLA DE INICIO -->
  <div id="startScreen" class="screen active">
    <div class="start-content">
      <h1 class="title-main">La Leyenda de los Derrotados</h1>
      <div class="divider"></div>
      <p class="subtitle">Un cuento sobre villanos, destino y segundas oportunidades</p>
      <button id="startBtn" class="btn-start">Comenzar la Historia</button>
      <p class="hint">Presiona ESC en cualquier momento para volver aquí</p>
    </div>
  </div>

  <!-- PANTALLA DE LECTURA -->
  <div id="storyScreen" class="screen">
    
    <!-- FONDO VISUAL -->
    <div id="storyBackground" class="story-bg"></div>
    
    <!-- CONTENEDOR PRINCIPAL -->
    <div class="story-container">
      
      <!-- LADO IZQUIERDO - NARRACIÓN -->
      <div class="narrative-panel">
        <div class="chapter-info">
          <span id="chapterNum" class="chapter-number">Cap. 1</span>
          <h2 id="chapterTitle" class="chapter-title">El Comienzo</h2>
        </div>
        
        <div id="narrativeText" class="narrative-text">
          <!-- El texto se inserta aquí -->
        </div>
        
        <div class="narrative-footer">
          <span id="pageIndicator" class="page-indicator">Página 1 de 10</span>
        </div>
      </div>

      <!-- LADO DERECHO - PERSONAJE O ILUSTRACIÓN -->
      <div class="visual-panel">
        <div id="characterArt" class="character-art">
          <!-- Imagen o ilustración -->
        </div>
        <div id="characterName" class="character-name">
          <!-- Nombre del personaje o locación -->
        </div>
      </div>

    </div>

    <!-- CONTROLES DE NAVEGACIÓN -->
    <div class="navigation">
      <button id="prevBtn" class="nav-btn prev-btn" title="Página anterior (←)">
        <span>←</span>
      </button>
      
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      
      <button id="nextBtn" class="nav-btn next-btn" title="Página siguiente (→)">
        <span>→</span>
      </button>
    </div>

    <!-- MENU FLOTANTE -->
    <div class="menu-button" title="Menú">
      <span>⋮</span>
    </div>

  </div>

  <!-- MENÚ LATERAL -->
  <div id="sideMenu" class="side-menu">
    <button id="closeMenu" class="close-menu">✕</button>
    <h3>Menú</h3>
    <button id="resumeBtn" class="menu-option">Continuar Lectura</button>
    <button id="toStartBtn" class="menu-option">Volver al Inicio</button>
    <button id="statsBtn" class="menu-option">Estadísticas</button>
    <div class="menu-divider"></div>
    <p class="menu-info">
      <strong>Controles:</strong><br>
      ← → o Flechas del teclado<br>
      ESC para menú
    </p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
