<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Leyenda de los Derrotados - Mapa</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-container">
  
  <!-- PANTALLA DE INICIO -->
  <div id="startScreen" class="screen active">
    <div class="start-overlay"></div>
    <div class="start-content">
      <h1 class="title-main">La Leyenda de los Derrotados</h1>
      <div class="divider"></div>
      <p class="subtitle">Un mapa de recuerdos, historias de villanos derrotados</p>
      <button id="startBtn" class="btn-start">Explorar el Mapa</button>
    </div>
  </div>

  <!-- PANTALLA DEL MAPA -->
  <div id="mapScreen" class="screen">
    
    <!-- FONDO DEL MAPA -->
    <div class="map-background">
      <div class="map-texture"></div>
    </div>

    <!-- CONTENEDOR DEL MAPA INTERACTIVO -->
    <div class="map-container">
      <svg class="map-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
        <defs>
          <radialGradient id="islandGradient" cx="50%" cy="30%">
            <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8b7355;stop-opacity:1" />
          </radialGradient>
        </defs>
        <!-- ISLAS (se insertan con JavaScript) -->
        <g id="islands"></g>
      </svg>

      <!-- CONTROLES FLOTANTES -->
      <div class="map-controls">
        <button id="backBtn" class="control-btn" title="Volver">← Atrás</button>
      </div>

    </div>

  </div>

  <!-- MODAL DE HISTORIA -->
  <div id="storyModal" class="modal">
    <div class="modal-overlay"></div>
    
    <div class="modal-content">
      <button id="closeModal" class="close-btn">✕</button>
      
      <div class="story-header">
        <h2 id="storyCharacterName" class="story-name">Nombre del Personaje</h2>
        <p id="storyRole" class="story-role">Rol / Título</p>
      </div>

      <div class="story-body">
        <div id="storyText" class="story-text">
          <!-- Historia se inserta aquí -->
        </div>

        <div class="story-info">
          <div class="info-item">
            <span class="info-label">Edad:</span>
            <span id="storyAge" class="info-value">—</span>
          </div>
          <div class="info-item">
            <span class="info-label">Origen:</span>
            <span id="storyOrigin" class="info-value">—</span>
          </div>
          <div class="info-item">
            <span class="info-label">Estado:</span>
            <span id="storyStatus" class="info-value">—</span>
          </div>
        </div>
      </div>

      <div class="story-footer">
        <button id="prevStory" class="story-nav-btn">← Anterior</button>
        <span id="storyCounter" class="story-counter">1 / 5</span>
        <button id="nextStory" class="story-nav-btn">Siguiente →</button>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
